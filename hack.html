  js: `// Express REST API for user authentication
const express = require('express');
const bcrypt = require('bcrypt');
const jwt = require('jsonwebtoken');
const router = express.Router();

const SALT_ROUNDS = 10;
const TOKEN_EXPIRY = '7d';

async function registerUser(req, res) {
  const { email, password, name } = req.body;
  if (!email || !password) return res.status(400).json({ error: 'Email and password required' });
  const existing = await db.users.findOne({ email });
  if (existing) return res.status(409).json({ error: 'Email already registered' });
  const hashed = await bcrypt.hash(password, SALT_ROUNDS);
  const user = await db.users.create({ email, password: hashed, name });
  const token = jwt.sign({ userId: user.id }, process.env.JWT_SECRET, { expiresIn: TOKEN_EXPIRY });
  res.status(201).json({ user: { id: user.id, email, name }, token });
}

async function loginUser(req, res) {
  const { email, password } = req.body;
  const user = await db.users.findOne({ email });
  if (!user) return res.status(401).json({ error: 'Invalid credentials' });
  const valid = await bcrypt.compare(password, user.password);
  if (!valid) return res.status(401).json({ error: 'Invalid credentials' });
  const token = jwt.sign({ userId: user.id }, process.env.JWT_SECRET, { expiresIn: TOKEN_EXPIRY });
  res.json({ token, user: { id: user.id, email, name: user.name } });
}

function authMiddleware(req, res, next) {
  const token = req.headers.authorization?.split(' ')[1];
  if (!token) return res.status(401).json({ error: 'No token provided' });
  try {
    req.user = jwt.verify(token, process.env.JWT_SECRET);
    next();
  } catch {
    res.status(401).json({ error: 'Invalid or expired token' });
  }
}

router.post('/register', registerUser);
router.post('/login', loginUser);
router.get('/profile', authMiddleware, (req, res) => res.json({ userId: req.user.userId }));
module.exports = router;`,

  py: `from dataclasses import dataclass
from typing import Optional, List, Any
import time

@dataclass
class CacheEntry:
    key: str
    value: Any
    expires_at: float
    hits: int = 0

class LRUCache:
    """Thread-safe LRU cache with TTL support and statistics."""

    def __init__(self, capacity: int, default_ttl: int = 300):
        self.capacity = capacity
        self.default_ttl = default_ttl
        self._store: dict[str, CacheEntry] = {}
        self._order: List[str] = []

    def get(self, key: str) -> Optional[Any]:
        if key not in self._store:
            return None
        entry = self._store[key]
        if time.time() > entry.expires_at:
            self._evict(key)
            return None
        entry.hits += 1
        self._order.remove(key)
        self._order.append(key)
        return entry.value

    def set(self, key: str, value: Any, ttl: int = None) -> None:
        if key in self._store:
            self._evict(key)
        elif len(self._store) >= self.capacity:
            self._evict(self._order[0])
        ttl = ttl or self.default_ttl
        self._store[key] = CacheEntry(key, value, time.time() + ttl)
        self._order.append(key)

    def _evict(self, key: str) -> None:
        if key in self._store:
            del self._store[key]
            if key in self._order:
                self._order.remove(key)

    def stats(self) -> dict:
        return {
            'size': len(self._store),
            'capacity': self.capacity,
            'hit_count': sum(e.hits for e in self._store.values())
        }`,

  sql: `-- User analytics queries for dashboard reporting

-- Daily active users for the last 30 days
SELECT
  DATE(created_at) as date,
  COUNT(DISTINCT user_id) as dau,
  COUNT(*) as total_events
FROM user_events
WHERE created_at >= NOW() - INTERVAL '30 days'
  AND event_type NOT IN ('bot', 'internal')
GROUP BY DATE(created_at)
ORDER BY date DESC;

-- User retention cohort analysis
WITH cohorts AS (
  SELECT user_id, DATE_TRUNC('week', MIN(created_at)) as cohort_week
  FROM users GROUP BY user_id
),
activity AS (
  SELECT DISTINCT user_id, DATE_TRUNC('week', created_at) as activity_week
  FROM user_events
)
SELECT
  c.cohort_week,
  COUNT(DISTINCT c.user_id) as cohort_size,
  a.activity_week,
  COUNT(DISTINCT a.user_id) as retained_users,
  ROUND(COUNT(DISTINCT a.user_id)::numeric / COUNT(DISTINCT c.user_id) * 100, 1) as retention_pct
FROM cohorts c
LEFT JOIN activity a ON c.user_id = a.user_id
GROUP BY c.cohort_week, a.activity_week
ORDER BY c.cohort_week, a.activity_week;`,

  ts: `import { Injectable, Logger } from '@nestjs/common';
import { InjectRepository } from '@nestjs/typeorm';
import { Repository } from 'typeorm';
import { EventEmitter2 } from '@nestjs/event-emitter';

interface NotificationPayload {
  userId: string;
  type: 'email' | 'sms' | 'push';
  title: string;
  body: string;
  metadata?: Record<string, unknown>;
}

interface SendResult {
  success: boolean;
  messageId?: string;
  error?: string;
  attempts: number;
}

@Injectable()
export class NotificationService {
  private readonly MAX_RETRIES = 3;
  private readonly logger = new Logger(NotificationService.name);

  constructor(
    @InjectRepository(Notification) private repo: Repository<Notification>,
    private events: EventEmitter2
  ) {}

  async send(payload: NotificationPayload): Promise<SendResult> {
    const notification = await this.repo.save({ ...payload, status: 'pending' });
    let attempt = 0;
    while (attempt < this.MAX_RETRIES) {
      try {
        const result = await this.dispatch(payload);
        await this.repo.update(notification.id, { status: 'sent', messageId: result.messageId });
        this.events.emit('notification.sent', { id: notification.id, ...payload });
        return { success: true, messageId: result.messageId, attempts: attempt + 1 };
      } catch (err) {
        attempt++;
        if (attempt === this.MAX_RETRIES) {
          await this.repo.update(notification.id, { status: 'failed', error: err.message });
          return { success: false, error: err.message, attempts: attempt };
        }
        await this.sleep(1000 * attempt);
      }
    }
  }

  private async dispatch(payload: NotificationPayload) {
    const providers = { email: this.sendEmail, sms: this.sendSMS, push: this.sendPush };
    return providers[payload.type]?.call(this, payload);
  }

  private sleep = (ms: number) => new Promise(r => setTimeout(r, ms));
}`

  py: `# LRUCache — Python Cache with TTL Support

## Overview

A pure-Python **Least Recently Used (LRU) cache** with per-entry TTL (time-to-live) expiry and hit tracking. Useful for caching database queries, API responses, or any expensive computation results.

## Classes

### \`CacheEntry\`

A lightweight dataclass representing a single cached item.

| Field | Type | Description |
|-------|------|-------------|
| \`key\` | \`str\` | Cache key identifier |
| \`value\` | \`Any\` | The cached value |
| \`expires_at\` | \`float\` | Unix timestamp when entry expires |
| \`hits\` | \`int\` | Number of times this entry was read (default: 0) |

---

### \`LRUCache\`

The main cache class implementing LRU eviction with TTL support.

#### Constructor

\`\`\`python
cache = LRUCache(capacity=100, default_ttl=300)
\`\`\`

| Parameter | Type | Default | Description |
|-----------|------|---------|-------------|
| \`capacity\` | \`int\` | — | Maximum number of entries before eviction |
| \`default_ttl\` | \`int\` | \`300\` | Default expiry in seconds (5 minutes) |

#### Methods

##### \`get(key: str) → Optional[Any]\`

Retrieves a cached value by key. Returns \`None\` if missing or expired. On hit, promotes the entry to most-recently-used position and increments its \`hits\` counter.

\`\`\`python
result = cache.get("user:42")  # None if expired or not found
\`\`\`

##### \`set(key: str, value: Any, ttl: int = None) → None\`

Stores a value in the cache. If the cache is full, the **least recently used** entry is evicted first. Accepts an optional per-entry TTL override.

\`\`\`python
cache.set("user:42", user_object, ttl=60)  # expires in 60s
\`\`\`

##### \`stats() → dict\`

Returns cache health statistics.

\`\`\`python
{ "size": 42, "capacity": 100, "hit_count": 1830 }
\`\`\`

## Usage Example

\`\`\`python
cache = LRUCache(capacity=500, default_ttl=120)
cache.set("config:theme", "dark")
theme = cache.get("config:theme")  # "dark"
print(cache.stats())               # { size: 1, capacity: 500, hit_count: 1 }
\`\`\``,

  sql: `# Analytics SQL Query Reference

## Overview

A collection of PostgreSQL analytical queries for building user engagement dashboards. Covers **Daily Active Users (DAU)** tracking and **cohort-based retention analysis**.

---

## Query 1 — Daily Active Users (DAU)

Calculates unique active users and total event volume per day for the past 30 days, excluding bot and internal traffic.

\`\`\`sql
SELECT
  DATE(created_at) as date,
  COUNT(DISTINCT user_id) as dau,
  COUNT(*) as total_events
FROM user_events
WHERE created_at >= NOW() - INTERVAL '30 days'
  AND event_type NOT IN ('bot', 'internal')
GROUP BY DATE(created_at)
ORDER BY date DESC;
\`\`\`

**Output columns:**

| Column | Type | Description |
|--------|------|-------------|
| \`date\` | date | Calendar day |
| \`dau\` | integer | Distinct active users |
| \`total_events\` | integer | All qualifying events that day |

**Performance tip:** Add a composite index on \`(created_at, event_type)\` to speed up the range + filter scan on large tables.

---

## Query 2 — Weekly Cohort Retention

Tracks what percentage of users who signed up in a given week are still active in subsequent weeks. Uses two CTEs for clean separation of cohort assignment and activity detection.

**CTEs:**

- **\`cohorts\`** — assigns each user to their signup week using \`DATE_TRUNC('week', MIN(created_at))\`
- **\`activity\`** — finds all weeks in which each user had any event

**Output columns:**

| Column | Description |
|--------|-------------|
| \`cohort_week\` | The week the cohort signed up |
| \`cohort_size\` | Total users in this cohort |
| \`activity_week\` | Week being measured |
| \`retained_users\` | Users from the cohort active that week |
| \`retention_pct\` | Retention percentage (0–100) |

**Interpreting results:** Week 0 retention should be ~100%. A healthy SaaS product typically shows 40–60% week-1 retention and stabilising around 20–30% by week-8.

  ts: `# NotificationService — NestJS Notification Module

## Overview

A resilient NestJS injectable service for delivering multi-channel notifications (email, SMS, push) with **automatic retry logic**, delivery status persistence, and event emission on success.

## Interfaces

### \`NotificationPayload\`

| Field | Type | Required | Description |
|-------|------|----------|-------------|
| \`userId\` | \`string\` | Yes | Recipient's user ID |
| \`type\` | \`'email' \| 'sms' \| 'push'\` | Yes | Delivery channel |
| \`title\` | \`string\` | Yes | Notification subject/title |
| \`body\` | \`string\` | Yes | Main notification content |
| \`metadata\` | \`Record<string, unknown>\` | No | Optional contextual data |

### \`SendResult\`

| Field | Type | Description |
|-------|------|-------------|
| \`success\` | \`boolean\` | Whether delivery succeeded |
| \`messageId\` | \`string\` | Provider's message ID (on success) |
| \`error\` | \`string\` | Error message (on failure) |
| \`attempts\` | \`number\` | Total delivery attempts made |

## Methods

### \`send(payload: NotificationPayload): Promise<SendResult>\`

Main entry point. Persists the notification with \`status: 'pending'\`, then attempts delivery up to **3 times** with exponential backoff (1s, 2s, 3s between retries).

On success: updates DB record to \`status: 'sent'\` and emits \`notification.sent\` event.
On all retries exhausted: updates DB to \`status: 'failed'\` and returns the error.

\`\`\`typescript
const result = await notificationService.send({
  userId: 'user_123',
  type: 'email',
  title: 'Welcome!',
  body: 'Thanks for signing up.'
});
// { success: true, messageId: 'msg_abc', attempts: 1 }
\`\`\`

### \`dispatch(payload)\` *(private)*

Routes the payload to the correct provider (\`sendEmail\`, \`sendSMS\`, or \`sendPush\`) based on \`payload.type\`. Throws if type is unrecognised.

## Events

| Event | Payload | Description |
|-------|---------|-------------|
| \`notification.sent\` | \`{ id, userId, type, title, body }\` | Emitted on successful delivery |

## Configuration

| Property | Default | Description |
|----------|---------|-------------|
| \`MAX_RETRIES\` | \`3\` | Maximum delivery attempts before giving up |
| Retry backoff | 1s × attempt | Delay grows linearly with each retry |`

// ─── MOCK STATS ────────────────────────────────────────────────────────────
const MOCK_STATS = {
  js:  { funcs: 4, lines: 34, tokens: 847, time: '1.8s' },
  py:  { funcs: 5, lines: 42, tokens: 912, time: '2.1s' },
  sql: { funcs: 2, lines: 31, tokens: 763, time: '1.6s' },
  ts:  { funcs: 3, lines: 47, tokens: 988, time: '2.3s' },
};

// ─── APP STATE ─────────────────────────────────────────────────────────────
let currentDoc = '';
let currentSample = null;

function loadSample(key) {
  document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + key).classList.add('active');
  document.getElementById('code-input').value = SAMPLES[key];
  currentSample = key;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['preview','markdown'][i] === tab));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', ['preview','markdown'][i] === tab));
}

function renderMarkdown(md) {
  let html = md
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^\| (.+) \|$/gm, (m, row) => '<tr>' + row.split(' | ').map(c => `<td>${c}</td>`).join('') + '</tr>')
    .replace(/^\|[-| :]+\|$/gm, '')
    .replace(/((<tr>.*<\/tr>\s*)+)/gs, m => '<table>' + m.replace(/<tr><td>[-|: ]+<\/td><\/tr>/g,'') + '</table>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\s*)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n\n+/g, '</p><p>');
  return '<div class="doc-md"><p>' + html + '</p></div>';
}

// Typewriter effect — streams text char by char into the preview
function typewriterRender(mdText, onDone) {
  const preview = document.getElementById('tab-preview');
  preview.innerHTML = '<div class="doc-md"></div>';
  const target = preview.querySelector('.doc-md');

  // Stream in chunks for speed
  const CHUNK = 12;
  let i = 0;
  let displayed = '';

  function tick() {
    if (i >= mdText.length) {
      // Final render with proper markdown
      preview.innerHTML = renderMarkdown(mdText);
      onDone && onDone();
      return;
    }
    displayed += mdText.slice(i, i + CHUNK);
    i += CHUNK;
    // Quick partial render
    target.innerHTML = '<p>' + displayed.replace(/\n/g,'<br>') + '<span class="typing-cursor"></span></p>';
    target.scrollTop = target.scrollHeight;
    setTimeout(tick, 14);
  }
  tick();
}

async function generateDocs() {
  const code = document.getElementById('code-input').value.trim();
  if (!code) { alert('Please paste some code or click a sample above.'); return; }

  const btn = document.getElementById('gen-btn');
  const outBox = document.getElementById('output-box');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  outBox.classList.remove('empty');
  outBox.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:8px 0;">🤖 AI is reading your code...</p>';
  document.getElementById('tabs-section').style.display = 'none';
  document.getElementById('stats-section').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';

  // Simulate realistic AI thinking delay (1.6 – 2.4 s)
  const delay = 1600 + Math.random() * 800;
  await new Promise(r => setTimeout(r, delay));

  // Pick the matching mock doc, or generate a generic one
  const key = currentSample || detectSample(code);
  const doc = MOCK_DOCS[key] || buildGenericDoc(code);
  const stats = MOCK_STATS[key] || { funcs: 3, lines: code.split('\n').length, tokens: 720, time: '1.9s' };

  currentDoc = doc;

  // Show stats
  document.getElementById('stat-funcs').textContent = stats.funcs;
  document.getElementById('stat-lines').textContent = stats.lines;
  document.getElementById('stat-tokens').textContent = stats.tokens;
  document.getElementById('stat-time').textContent = stats.time;
  document.getElementById('stats-section').style.display = 'block';

  // Show tabs section, hide placeholder
  outBox.style.display = 'none';
  document.getElementById('tabs-section').style.display = 'block';

  // Activate preview tab
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===0));

  btn.innerHTML = '<div class="spinner"></div> Writing docs...';

  // Stream the doc in with typewriter effect
  typewriterRender(doc, () => {
    document.getElementById('raw-md').textContent = doc;
    document.getElementById('copy-btn').style.display = 'inline-flex';
    btn.disabled = false;
    btn.innerHTML = '✦ Generate Docs';
  });
}

function detectSample(code) {
  if (code.includes('bcrypt') || code.includes('jwt') || code.includes('express')) return 'js';
  if (code.includes('def ') || code.includes('LRUCache') || code.includes('dataclass')) return 'py';
  if (code.includes('SELECT') || code.includes('FROM ') || code.includes('GROUP BY')) return 'sql';
  if (code.includes('Injectable') || code.includes('interface ') || code.includes(': Promise')) return 'ts';
  return 'js';
}

function buildGenericDoc(code) {
  const lines = code.split('\n').length;
  const funcs = (code.match(/function\s+\w+|def\s+\w+|async\s+\w+\s*\(/g) || []).length || 2;
  return `# Code Documentation

## Overview

This module contains ${funcs} function${funcs > 1 ? 's' : ''} across ${lines} lines of code. It handles core application logic with clear separation of concerns.

## Functions

### Main entry points

The code exposes several key functions that form the public API of this module. Each function follows single-responsibility principles and includes error handling for edge cases.

## Usage Example

\`\`\`javascript
// Import and initialize the module
const module = require('./module');

// Call with required parameters
const result = await module.process(input);
console.log(result);
\`\`\`

## Error Handling

- Input validation is performed at the function entry point
- Errors are propagated with descriptive messages
- Edge cases return \`null\` or throw typed exceptions

## Notes

- All async functions return Promises
- Follows ESLint standard style
- Compatible with Node.js 18+`;
}

async function copyDoc() {
  try {
    await navigator.clipboard.writeText(currentDoc);
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = currentDoc;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}
